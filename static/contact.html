<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | R-Abhi Tech Solution</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <img src="/static/logo.png" alt="R-Abhi Tech Solution" class="site-logo" />
      <div class="brand-details">
        <p class="brand-name">R-ABHI TECH SOLUTION</p>
        <p class="brand-tagline">Contact and support page.</p>
      </div>
    </div>
    <div class="header-actions">
      <a href="/" class="secondary" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">Home</a>
      <a href="/about" class="secondary" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">About</a>
      <a href="/media" class="secondary" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">Media</a>
      <a href="/work" class="secondary" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">Work</a>
      <a href="/registration" class="secondary" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">Registration</a>
      <a href="/admin" class="secondary" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">Admin</a>
    </div>
  </header>
  <div class="page-shell">
    <section class="section-block">
      <div class="section-head">
        <span class="eyebrow">Contact</span>
        <h2>Get in touch with the team.</h2>
        <p>Send a message for support, sponsorships, marketing collaboration, or portal access.</p>
      </div>
      <div class="feature-grid">
        <article class="feature-card">
          <h3>Message us</h3>
          <form id="contact-form" class="contact-form">
            <label>Name<input type="text" id="contact-name" required /></label>
            <label>Email<input type="email" id="contact-email" required /></label>
            <label>Message<textarea id="contact-message-input" rows="5" required></textarea></label>
            <div class="button-row">
              <button type="submit" class="primary">Send Message</button>
            </div>
            <div id="contact-status" class="status-message"></div>
          </form>
        </article>
        <article class="feature-card">
          <h3>AI assistant</h3>
          <div class="record-form">
            <label>Ask something<input type="text" id="chat-input" placeholder="How do I register?" /></label>
            <div class="button-row">
              <button id="chat-send" class="secondary">Ask Assistant</button>
            </div>
            <div id="chat-response" class="status-message"></div>
          </div>
        </article>
      </div>
    </section>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
